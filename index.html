<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<title>Portal de Acessos - Grupo Areia Ana</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root {
  --bg: #050814;
  --bg-card: #0b1020;
  --bg-card-soft: #101629;
  --accent: #ff7a1a;
  --accent-soft: #ff9b4a;
  --text: #f5f7ff;
  --text-soft: #c2c7ff;
}

body {
  font-family: system-ui, sans-serif;
  background: radial-gradient(circle at top, #151821 0, #050814 45%, #02030a 100%);
  color: var(--text);
  margin: 0;
  padding: 24px;
}

/* LOGIN */
.login-overlay{
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at top, #151821 0, #050814 45%, #02030a 100%);
  display: flex;
  align-items: center;
  justify-content: center;
}

.login-box{
  width: min(720px, 92vw);
  padding: 56px 64px;
  border-radius: 18px;
  background: rgba(11, 16, 32, 0.75);
  border: 1px solid rgba(255, 154, 74, 0.22);
  text-align: center;
}

/* NOVA LOGO LOGIN */
.login-logo{
  width: 180px;
  margin-bottom: 20px;
  opacity: 0.95;
}

/* PORTAL */
.container {
  max-width: 1150px;
  margin: auto;
  display: none;
}

.logo {
  width: 180px;
}

/* MENU */
.main-menu {
  margin: 24px 0;
  display: grid;
  grid-template-columns: repeat(6, 1fr); /* aumentado */
  gap: 10px;
}

.menu-btn {
  padding: 12px 14px;
  border-radius: 999px;
  border: 1px solid rgba(255, 154, 74, 0.3);
  background: linear-gradient(135deg, rgba(255,122,26,0.12), rgba(5,8,20,0.95));
  color: var(--text);
  font-weight: 600;
  cursor: pointer;
}

.menu-btn.active {
  background: linear-gradient(135deg, var(--accent), var(--accent-soft));
  color: #050814;
}

.section {margin-bottom: 28px;}
.hidden {display:none;}

.section-title {
  font-size: 18px;
  margin-bottom: 14px;
  color: var(--accent-soft);
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 12px;
}

.grid-calendario {
  display: grid;
  grid-template-columns: minmax(260px, 420px);
}

.link-card {
  padding: 14px;
  background: var(--bg-card);
  border-radius: 12px;
  border: 1px solid rgba(255, 154, 74, 0.25);
  color: var(--text);
  text-decoration: none;
}

.link-card:hover {
  transform: translateY(-2px);
  background: var(--bg-card-soft);
  border-color: var(--accent-soft);
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">

    <!-- LOGO ADICIONADA -->
    <img src="logo-areia-ana.png" class="login-logo">

    <div class="login-title">Portal Areia Ana</div>
    <div class="login-subtitle">Acesso restrito</div>

    <input type="password" id="senha" class="login-input" placeholder="Digite a senha">
    <button class="login-btn" onclick="validarSenha()">Entrar</button>
  </div>
</div>

<!-- PORTAL -->
<div class="container" id="portal">

<header>
  <img src="logo-areia-ana.png" class="logo">
  <h1>Portal de Acessos – Grupo Areia Ana</h1>
  <p class="subtitle">Escolha uma área e clique para abrir o painel ou sistema.</p>
</header>

<!-- MENU -->
<div class="main-menu">
  <button class="menu-btn active" onclick="showSection('indicadores', this)">Indicadores</button>
  <button class="menu-btn" onclick="showSection('comercial', this)">Comercial</button>
  <button class="menu-btn" onclick="showSection('rh', this)">RH</button>
  <button class="menu-btn" onclick="showSection('sistemas', this)">Sistemas</button>

  <!-- NOVA ABA (POSIÇÃO CERTA) -->
  <button class="menu-btn" onclick="showSection('planejamento', this)">Planejamento</button>

  <button class="menu-btn" onclick="showSection('calendario', this)">Calendário</button>
</div>

<!-- NOVA SEÇÃO -->
<section id="planejamento" class="section hidden">
  <div class="section-title">Planejamento e Controle</div>
  <div class="grid">

    <a class="link-card" target="_blank" href="https://app.clickup.com/9007105436/v/l/8cdv1cw-423">
      <div class="link-title">Painel Planejamento</div>
      <div class="link-meta">ClickUp</div>
    </a>

  </div>
</section>

<!-- RESTANTE DO CÓDIGO (NÃO ALTERADO) -->

</div>

<script>
const SENHA_CORRETA = "areiaadmin";

function validarSenha(){
  if(document.getElementById("senha").value === SENHA_CORRETA){
    document.getElementById("loginOverlay").style.display = "none";
    document.getElementById("portal").style.display = "block";
  }
}

function showSection(id, btn){
  document.querySelectorAll(".section").forEach(sec => sec.classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");

  document.querySelectorAll(".menu-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
}
</script>

</body>
</html>
