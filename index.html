<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<title>Portal de Acessos - Grupo Areia Ana</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root {
  --bg: #050814;
  --bg-card: #0b1020;
  --bg-card-soft: #101629;
  --accent: #ff7a1a;
  --accent-soft: #ff9b4a;
  --text: #f5f7ff;
  --text-soft: #c2c7ff;
}

body {
  font-family: system-ui, sans-serif;
  background: radial-gradient(circle at top, #151821 0, #050814 45%, #02030a 100%);
  color: var(--text);
  margin: 0;
  padding: 24px;
}

/* LOGIN */
.login-overlay{
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

.login-box{
  width: min(720px, 92vw);
  padding: 56px;
  border-radius: 18px;
  background: rgba(11,16,32,.75);
  border: 1px solid rgba(255,154,74,.22);
  text-align: center;
}

/* NOVO: LOGO NO LOGIN */
.login-logo{
  width: 140px;
  margin-bottom: 20px;
}

.login-title{
  font-size: 28px;
  font-weight: 800;
}

.login-input{
  width: 100%;
  height: 50px;
  margin-top: 15px;
  border-radius: 12px;
  padding: 0 15px;
}

.login-btn{
  width: 100%;
  height: 50px;
  margin-top: 10px;
  border-radius: 999px;
  background: var(--accent);
  font-weight: bold;
}

/* PORTAL */
.container {
  display: none;
  max-width: 1150px;
  margin: auto;
}

.logo {
  width: 180px;
}

.main-menu {
  display: grid;
  grid-template-columns: repeat(6,1fr);
  gap: 10px;
}

.menu-btn {
  padding: 12px;
  border-radius: 999px;
  background: #111;
  color: white;
  cursor: pointer;
}

.menu-btn.active {
  background: orange;
  color: black;
}

.section {margin-top:20px;}
.hidden {display:none;}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
  gap:10px;
}

.link-card{
  padding:15px;
  background:#111;
  border-radius:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">

    <!-- NOVA LOGO -->
    <img src="logo-areia-ana.png" class="login-logo">

    <div class="login-title">Portal Areia Ana</div>

    <input type="password" id="senha" class="login-input" placeholder="Senha">
    <button class="login-btn" onclick="validarSenha()">Entrar</button>

  </div>
</div>

<!-- PORTAL -->
<div class="container" id="portal">

<header>
  <img src="logo-areia-ana.png" class="logo">
  <h1>Portal de Acessos – Grupo Areia Ana</h1>
</header>

<!-- MENU -->
<div class="main-menu">
  <button class="menu-btn active" onclick="showSection('indicadores',this)">Indicadores</button>
  <button class="menu-btn" onclick="showSection('comercial',this)">Comercial</button>
  <button class="menu-btn" onclick="showSection('rh',this)">RH</button>
  <button class="menu-btn" onclick="showSection('sistemas',this)">Sistemas</button>

  <!-- NOVA ABA -->
  <button class="menu-btn" onclick="showSection('planejamento',this)">Planejamento</button>

  <button class="menu-btn" onclick="showSection('calendario',this)">Calendário</button>
</div>

<!-- NOVA SEÇÃO -->
<section id="planejamento" class="section hidden">
  <h3>Planejamento e Controle</h3>
  <div class="grid">
    <a class="link-card" target="_blank" href="https://app.clickup.com/9007105436/v/l/8cdv1cw-423">
      Abrir Planejamento ClickUp
    </a>
  </div>
</section>

</div>

<script>
const SENHA_CORRETA="areiaadmin";

function validarSenha(){
  if(document.getElementById("senha").value===SENHA_CORRETA){
    document.getElementById("loginOverlay").style.display="none";
    document.getElementById("portal").style.display="block";
  }
}

function showSection(id,btn){
  document.querySelectorAll(".section").forEach(s=>s.classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");

  document.querySelectorAll(".menu-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
}
</script>

</body>
</html>
