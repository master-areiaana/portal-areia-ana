<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<title>Portal de Acessos - Grupo Areia Ana</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root {
  --bg: #050814;
  --bg-card: #0b1020;
  --bg-card-soft: #101629;
  --accent: #ff7a1a;
  --accent-soft: #ff9b4a;
  --text: #f5f7ff;
  --text-soft: #c2c7ff;
}

body {
  font-family: system-ui, sans-serif;
  background: radial-gradient(circle at top, #151821 0, #050814 45%, #02030a 100%);
  color: var(--text);
  margin: 0;
  padding: 24px;
}

/* LOGIN */
.login-overlay{
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

.login-box{
  width: min(720px, 92vw);
  padding: 56px;
  border-radius: 18px;
  background: rgba(11, 16, 32, 0.85);
  text-align: center;
}

.login-logo{
  width: 220px;
  margin-bottom: 20px;
}

.login-input{
  width: 100%;
  height: 50px;
  border-radius: 10px;
  border: none;
  padding: 10px;
  margin-bottom: 10px;
}

.login-btn{
  width: 100%;
  height: 50px;
  border-radius: 10px;
  border: none;
  background: var(--accent);
  color: #000;
  font-weight: bold;
  cursor: pointer;
}

/* PORTAL */
.container {
  max-width: 1150px;
  margin: auto;
  display: none;
}

.logo {
  width: 180px;
}

.subtitle {
  color: var(--text-soft);
}

/* MENU */
.main-menu {
  margin: 24px 0;
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 10px;
}

.menu-btn {
  padding: 12px;
  border-radius: 999px;
  border: 1px solid rgba(255, 154, 74, 0.3);
  background: #0b1020;
  color: var(--text);
  cursor: pointer;
}

.menu-btn.active {
  background: var(--accent);
  color: #050814;
}

.section {
  display: none;
}

.section.active {
  display: block;
}

.section-title {
  color: var(--accent-soft);
  margin-bottom: 10px;
}

.grid-calendario {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 420px));
  gap: 12px;
}

.link-card {
  padding: 14px;
  background: var(--bg-card);
  border-radius: 12px;
  border: 1px solid rgba(255, 154, 74, 0.25);
  text-decoration: none;
  color: var(--text);
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">

    <img src="logo-areia-ana.png" class="login-logo">

    <h2>Portal Areia Ana</h2>
    <p>Acesso restrito</p>

    <input type="password" id="senha" class="login-input" placeholder="Digite a senha">
    <button class="login-btn" onclick="login()">Entrar</button>

  </div>
</div>

<!-- PORTAL -->
<div class="container" id="portal">

<header style="text-align:center;">
  <img src="logo-areia-ana.png" class="logo">
  <h1>Portal de Acessos – Grupo Areia Ana</h1>
  <p class="subtitle">Escolha uma área e clique para abrir o painel ou sistema.</p>
</header>

<!-- MENU -->
<div class="main-menu">
  <button class="menu-btn active" onclick="openTab('indicadores',this)">Indicadores</button>
  <button class="menu-btn" onclick="openTab('comercial',this)">Comercial</button>
  <button class="menu-btn" onclick="openTab('rh',this)">RH</button>
  <button class="menu-btn" onclick="openTab('sistemas',this)">Sistemas</button>
  <button class="menu-btn" onclick="openTab('calendario',this)">Calendário</button>
</div>

<!-- CALENDÁRIO -->
<section id="calendario" class="section">

  <div class="section-title">Calendário Corporativo</div>

  <div class="grid-calendario">

    <!-- CARD ORIGINAL -->
    <a class="link-card" target="_blank"
       href="https://masterareiaana.github.io/agenda-areia-ana/calendario.html">
      <div><strong>Calendário Corporativo – Areia Ana</strong></div>
      <div style="font-size:12px; color:var(--text-soft)">Abrir agenda completa</div>
    </a>

    <!-- NOVO CARD -->
    <a class="link-card" target="_blank"
       href="https://app.clickup.com/9007105436/v/l/8cdv1cw-423">
      <div><strong>Planejamento e Controle</strong></div>
      <div style="font-size:12px; color:var(--text-soft)">ClickUp</div>
    </a>

  </div>

</section>

</div>

<script>
const SENHA_CORRETA = "areiaadmin";

function login(){
  if(document.getElementById("senha").value === SENHA_CORRETA){
    document.getElementById("loginOverlay").style.display = "none";
    document.getElementById("portal").style.display = "block";
    openTab('calendario', document.querySelector('.menu-btn:last-child'));
  } else {
    alert("Senha incorreta");
  }
}

function openTab(id,btn){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");

  document.querySelectorAll(".menu-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
}
</script>

</body>
</html>
