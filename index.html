<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<title>Portal de Acessos - Grupo Areia Ana</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root {
  --bg: #050814;
  --bg-card: #0b1020;
  --bg-card-soft: #101629;
  --accent: #ff7a1a;
  --accent-soft: #ff9b4a;
  --text: #f5f7ff;
  --text-soft: #c2c7ff;
}

body {
  font-family: system-ui, sans-serif;
  background: radial-gradient(circle at top, #151821 0, #050814 45%, #02030a 100%);
  color: var(--text);
  margin: 0;
  padding: 24px;
}

/* LOGIN */
.login-overlay{
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: radial-gradient(circle at top, #151821 0, #050814 45%, #02030a 100%);
}

.login-box{
  width: min(720px, 92vw);
  padding: 56px;
  border-radius: 18px;
  background: rgba(11,16,32,.75);
  border: 1px solid rgba(255,154,74,.22);
  text-align: center;
}

.login-logo{
  width: 180px;
  margin-bottom: 20px;
}

.login-input{
  width: 100%;
  height: 50px;
  border-radius: 12px;
  border: none;
  padding: 10px;
  margin-top: 10px;
}

.login-btn{
  margin-top: 12px;
  width: 100%;
  height: 50px;
  border-radius: 999px;
  border: none;
  background: linear-gradient(135deg, var(--accent), var(--accent-soft));
  font-weight: bold;
  cursor: pointer;
}

/* PORTAL */
.container {display:none; max-width:1150px; margin:auto;}

.logo {width:180px;}

.main-menu{
  margin:24px 0;
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:10px;
}

.menu-btn{
  padding:12px;
  border-radius:999px;
  border:1px solid rgba(255,154,74,.3);
  background: rgba(255,122,26,0.1);
  color:var(--text);
  cursor:pointer;
}

.menu-btn.active{
  background: linear-gradient(135deg, var(--accent), var(--accent-soft));
  color:#050814;
}

.section{margin-bottom:28px;}
.hidden{display:none;}

.section-title{
  color:var(--accent-soft);
  margin-bottom:12px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:12px;
}

.grid-calendario{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
}

.link-card{
  padding:14px;
  background:var(--bg-card);
  border-radius:12px;
  border:1px solid rgba(255,154,74,.25);
  text-decoration:none;
  color:var(--text);
}

.link-card:hover{
  background:var(--bg-card-soft);
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">

    <img src="logo-areia-ana.png" class="login-logo">

    <h2>Portal Areia Ana</h2>
    <p>Acesso restrito</p>

    <input type="password" id="senha" class="login-input" placeholder="Digite a senha">
    <button class="login-btn" onclick="validarSenha()">Entrar</button>

  </div>
</div>

<!-- PORTAL -->
<div class="container" id="portal">

<header style="text-align:center;">
  <img src="logo-areia-ana.png" class="logo">
  <h1>Portal de Acessos – Grupo Areia Ana</h1>
</header>

<!-- MENU -->
<div class="main-menu">
  <button class="menu-btn active" onclick="showSection('indicadores', this)">Indicadores</button>
  <button class="menu-btn" onclick="showSection('comercial', this)">Comercial</button>
  <button class="menu-btn" onclick="showSection('rh', this)">RH</button>
  <button class="menu-btn" onclick="showSection('sistemas', this)">Sistemas</button>
  <button class="menu-btn" onclick="showSection('calendario', this)">Calendário</button>
</div>

<!-- INDICADORES -->
<section id="indicadores" class="section">
  <div class="section-title">Indicadores</div>
  <div class="grid">
    <a class="link-card" target="_blank" href="https://app.powerbi.com">
      <div>Power BI</div>
    </a>
  </div>
</section>

<!-- COMERCIAL -->
<section id="comercial" class="section hidden">
  <div class="section-title">Comercial</div>
  <div class="grid">
    <a class="link-card" target="_blank" href="https://clickup.com">
      <div>ClickUp</div>
    </a>
  </div>
</section>

<!-- RH -->
<section id="rh" class="section hidden">
  <div class="section-title">RH</div>
  <div class="grid">
    <a class="link-card" target="_blank" href="#">
      <div>RH Sistema</div>
    </a>
  </div>
</section>

<!-- SISTEMAS -->
<section id="sistemas" class="section hidden">
  <div class="section-title">Sistemas</div>
  <div class="grid">
    <a class="link-card" target="_blank" href="#">
      <div>Sistema Interno</div>
    </a>
  </div>
</section>

<!-- CALENDÁRIO -->
<section id="calendario" class="section hidden">
  <div class="section-title">Calendário Corporativo</div>

  <div class="grid-calendario">

    <a class="link-card" target="_blank"
       href="https://master-areiaana.github.io/agenda-areia-ana">
      <div>Calendário Corporativo – Areia Ana</div>
    </a>

    <a class="link-card" target="_blank"
       href="https://app.clickup.com/9007105436/v/l/8cdv1cw-423">
      <div>Planejamento e Controle</div>
    </a>

  </div>
</section>

</div>

<script>
const SENHA_CORRETA = "areiaadmin";

function validarSenha(){
  if(document.getElementById("senha").value === SENHA_CORRETA){
    document.getElementById("loginOverlay").style.display="none";
    document.getElementById("portal").style.display="block";
  }
}

function showSection(id, btn){
  document.querySelectorAll(".section").forEach(sec => sec.classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");

  document.querySelectorAll(".menu-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
}
</script>

</body>
</html>
