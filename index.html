<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<title>Portal de Acessos - Grupo Areia Ana</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root {
  --bg: #050814;
  --bg-card: #0b1020;
  --bg-card-soft: #101629;
  --accent: #ff7a1a;
  --accent-soft: #ff9b4a;
  --text: #f5f7ff;
  --text-soft: #c2c7ff;
}

body {
  font-family: system-ui;
  background: radial-gradient(circle at top, #151821 0, #050814 45%, #02030a 100%);
  color: var(--text);
  margin: 0;
  padding: 24px;
}

/* LOGIN */
.login-overlay{
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

.login-box{
  width: 500px;
  padding: 50px;
  border-radius: 16px;
  background: rgba(11,16,32,.8);
  text-align: center;
}

.login-logo{
  width: 220px;
  margin-bottom: 20px;
}

.login-input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:8px;
  border:none;
}

.login-btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background: var(--accent);
  cursor:pointer;
  font-weight:bold;
}

/* PORTAL */
.container{display:none;max-width:1150px;margin:auto}

.logo{width:200px}

/* MENU */
.main-menu{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:10px;
  margin:20px 0;
}

.menu-btn{
  padding:10px;
  border-radius:999px;
  border:1px solid #ff7a1a;
  background:#0b1020;
  color:white;
  cursor:pointer;
}

.menu-btn.active{
  background:var(--accent);
  color:black;
}

.section{display:none}
.section.active{display:block}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:12px;
}

.link-card{
  padding:14px;
  background:#0b1020;
  border-radius:10px;
  text-decoration:none;
  color:white;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <img src="logo-areia-ana.png" class="login-logo">
    <h2>Portal Areia Ana</h2>

    <input type="password" id="senha" class="login-input">
    <button class="login-btn" onclick="login()">Entrar</button>
  </div>
</div>

<!-- PORTAL -->
<div class="container" id="portal">

<header>
  <img src="logo-areia-ana.png" class="logo">
  <h1>Portal de Acessos – Grupo Areia Ana</h1>
</header>

<div class="main-menu">
  <button class="menu-btn active" onclick="openTab('indicadores',this)">Indicadores</button>
  <button class="menu-btn" onclick="openTab('comercial',this)">Comercial</button>
  <button class="menu-btn" onclick="openTab('rh',this)">RH</button>
  <button class="menu-btn" onclick="openTab('sistemas',this)">Sistemas</button>
  <button class="menu-btn" onclick="openTab('planejamento',this)">Planejamento</button>
  <button class="menu-btn" onclick="openTab('calendario',this)">Calendário</button>
</div>

<!-- INDICADORES -->
<section id="indicadores" class="section active">
  <div class="grid">
    <a class="link-card" href="#">Remessas Usina</a>
  </div>
</section>

<!-- COMERCIAL -->
<section id="comercial" class="section">
  <div class="grid">
    <a class="link-card" href="#">Carteira</a>
  </div>
</section>

<!-- RH -->
<section id="rh" class="section">
  <div class="grid">
    <a class="link-card" href="#">Ponto Mais</a>
  </div>
</section>

<!-- SISTEMAS -->
<section id="sistemas" class="section">
  <div class="grid">
    <a class="link-card" href="#">Topcon</a>
  </div>
</section>

<!-- PLANEJAMENTO -->
<section id="planejamento" class="section">
  <div class="grid">
    <a class="link-card" target="_blank"
       href="https://app.clickup.com/9007105436/v/l/8cdv1cw-423">
       Planejamento e Controle
    </a>
  </div>
</section>

<!-- CALENDÁRIO -->
<section id="calendario" class="section">
  <div class="grid">
    <a class="link-card">Calendário</a>
  </div>
</section>

</div>

<script>
function login(){
  if(document.getElementById("senha").value==="areiaadmin"){
    document.getElementById("loginOverlay").style.display="none";
    document.getElementById("portal").style.display="block";
  }else{
    alert("Senha incorreta");
  }
}

function openTab(id,btn){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");

  document.querySelectorAll(".menu-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
}
</script>

</body>
</html>
