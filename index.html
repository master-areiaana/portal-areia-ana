<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Portal Atualizado - Areia Ana</title>

<!-- REDIRECIONAMENTO AUTOMÁTICO -->
<meta http-equiv="refresh" content="3; url=https://master-areiaana.github.io/portal-areia-ana/">

<style>
:root {
  --bg: #050814;
  --bg-card: #0b1020;
  --accent: #ff7a1a;
  --accent-soft: #ff9b4a;
  --text: #f5f7ff;
  --text-soft: #c2c7ff;
}

body {
  margin: 0;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: radial-gradient(circle at top, #151821 0, #050814 45%, #02030a 100%);
  font-family: system-ui, sans-serif;
  color: var(--text);
}

.box {
  width: min(500px, 90%);
  padding: 40px;
  border-radius: 18px;
  background: rgba(11, 16, 32, 0.85);
  border: 1px solid rgba(255, 154, 74, 0.25);
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
}

/* LOGO */
.logo {
  width: 140px;
  margin-bottom: 20px;
  opacity: 0.95;
}

/* TITULO */
h1 {
  margin: 10px 0;
  font-size: 22px;
}

/* TEXTO */
p {
  color: var(--text-soft);
  font-size: 14px;
}

/* BOTÃO */
.btn {
  display: inline-block;
  margin-top: 20px;
  padding: 12px 22px;
  border-radius: 999px;
  text-decoration: none;
  font-weight: 700;
  color: #050814;
  background: linear-gradient(135deg, var(--accent), var(--accent-soft));
  transition: .2s;
}

.btn:hover {
  transform: translateY(-2px);
}
</style>
</head>

<body>

<div class="box">

  <!-- SUA LOGO -->
  <img src="logo-areia-ana.png" class="logo">

  <h1>Portal Atualizado</h1>

  <p>Estamos direcionando você para o novo portal.</p>
  <p>Caso não redirecione automaticamente:</p>

  <a class="btn" href="https://master-areiaana.github.io/portal-areia-ana/">
    Acessar Novo Portal
  </a>

</div>

</body>
</html>
